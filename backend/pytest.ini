[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Keep real external services and slow tests out of the default suite.
addopts = -ra -m "not external and not slow"
markers =
    unit: fast deterministic unit tests that do not require network or real services
    api: FastAPI route and HTTP behavior tests
    db: database-backed tests; skip cleanly when the local test database is unavailable
    migration: Alembic migration upgrade/downgrade verification tests
    integration: explicit integration tests across multiple app layers
    external: tests that require real external services; excluded by default
    slow: slower tests; excluded by default
    regression: tests added to prevent a known bug from returning
    adapter: adapter contract tests for broker, market-data, LLM, or TradingAgents boundaries
    smoke: small high-signal tests for basic application health
