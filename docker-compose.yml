services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-options-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_options_agent}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio_options_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio_options_agent_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
